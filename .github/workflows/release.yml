name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers workflow only when you push a tag starting with 'v' (e.g., v1.2)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build and Publish
      run: dotnet publish SHALLControl.csproj -c Release -o ./publish_output

    - name: Zip the Output
      run: Compress-Archive -Path ./publish_output/* -DestinationPath update.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: update.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
